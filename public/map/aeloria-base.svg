<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" width="1000" height="700">
  <defs>
    <filter id="parchment" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncR type="linear" slope="0.9" intercept="0.05"/>
        <feFuncG type="linear" slope="0.85" intercept="0.04"/>
        <feFuncB type="linear" slope="0.7" intercept="0.02"/>
      </feComponentTransfer>
    </filter>
    <filter id="wobble" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="4" seed="8" result="turbulence"/>
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="4" stdDeviation="6" flood-color="#1a0a00" flood-opacity="0.5"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0d0806" stop-opacity="0.75"/>
    </radialGradient>
    <radialGradient id="oceanGrad" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1e3d5c"/>
      <stop offset="100%" stop-color="#091520"/>
    </radialGradient>
    <linearGradient id="parchBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e8cc"/>
      <stop offset="50%" stop-color="#e8d8b0"/>
      <stop offset="100%" stop-color="#d8c898"/>
    </linearGradient>
    <linearGradient id="dreadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddeaf5"/>
      <stop offset="100%" stop-color="#b8ccd8"/>
    </linearGradient>
    <linearGradient id="veilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a6a3a"/>
      <stop offset="100%" stop-color="#1e4a1e"/>
    </linearGradient>
    <linearGradient id="ashenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a9088"/>
      <stop offset="100%" stop-color="#6a6058"/>
    </linearGradient>
    <linearGradient id="aranthorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccc088"/>
      <stop offset="100%" stop-color="#b8aa70"/>
    </linearGradient>
    <linearGradient id="darianGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8898aa"/>
      <stop offset="100%" stop-color="#607080"/>
    </linearGradient>
    <linearGradient id="sapphireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a8898"/>
      <stop offset="100%" stop-color="#2a6878"/>
    </linearGradient>
  </defs>

  <!-- Ocean base -->
  <rect width="1000" height="700" fill="url(#oceanGrad)"/>

  <!-- === CONTINENT LANDMASS === -->
  <g filter="url(#shadow)">
    <path d="M 65,90 L 278,75 L 600,72 L 660,72 L 810,90 L 910,110 L 920,300 L 910,490 L 885,580 L 850,645 L 700,670 L 540,685 L 370,682 L 220,660 L 112,625 L 65,570 L 55,420 L 65,280 Z"
      fill="url(#parchBase)" stroke="#8b6914" stroke-width="2" filter="url(#wobble)"/>
  </g>
  <!-- Parchment texture overlay on land -->
  <path d="M 65,90 L 278,75 L 600,72 L 660,72 L 810,90 L 910,110 L 920,300 L 910,490 L 885,580 L 850,645 L 700,670 L 540,685 L 370,682 L 220,660 L 112,625 L 65,570 L 55,420 L 65,280 Z"
    fill="url(#parchment)" opacity="0.42"/>

  <!-- === REGION FILLS === -->

  <!-- DREADSPIRE PEAKS (NW) -->
  <path d="M 65,90 L 278,75 L 278,325 L 65,325 Z"
    fill="url(#dreadGrad)" opacity="0.72" filter="url(#wobble)"/>

  <!-- VEILWOOD (N center-left) -->
  <path d="M 278,75 L 600,72 L 628,200 L 600,340 L 278,325 Z"
    fill="url(#veilGrad)" opacity="0.60" filter="url(#wobble)"/>

  <!-- ASHEN MARCHES (W center) -->
  <path d="M 65,325 L 278,325 L 308,455 L 300,610 L 122,640 L 65,575 Z"
    fill="url(#ashenGrad)" opacity="0.68" filter="url(#wobble)"/>

  <!-- ARANTHOR (center kingdom) -->
  <path d="M 278,325 L 600,340 L 628,200 L 625,175 L 625,605 L 410,652 L 300,610 L 308,455 Z"
    fill="url(#aranthorGrad)" opacity="0.60" filter="url(#wobble)"/>

  <!-- DARIAN EMPIRE (E) -->
  <path d="M 625,175 L 810,90 L 910,110 L 920,300 L 910,490 L 885,580 L 850,645 L 675,658 L 625,605 Z"
    fill="url(#darianGrad)" opacity="0.58" filter="url(#wobble)"/>

  <!-- SAPPHIRE COAST (S strip) -->
  <path d="M 300,610 L 625,605 L 675,658 L 850,645 L 700,670 L 540,685 L 370,682 L 220,660 L 122,640 Z"
    fill="url(#sapphireGrad)" opacity="0.65" filter="url(#wobble)"/>

  <!-- === SHATTERED ISLES (NE islands in sea) === -->
  <ellipse cx="808" cy="88" rx="88" ry="56" fill="#8aaabb" opacity="0.18"/>
  <ellipse cx="798" cy="92" rx="44" ry="20" fill="#c4b88a" stroke="#8b6914" stroke-width="1.5" filter="url(#wobble)"/>
  <ellipse cx="850" cy="67" rx="27" ry="13" fill="#c4b88a" stroke="#8b6914" stroke-width="1" filter="url(#wobble)"/>
  <ellipse cx="752" cy="82" rx="20" ry="10" fill="#c4b88a" stroke="#8b6914" stroke-width="1" filter="url(#wobble)"/>
  <ellipse cx="876" cy="108" rx="15" ry="8" fill="#c4b88a" stroke="#8b6914" stroke-width="0.8" filter="url(#wobble)"/>

  <!-- === DREADSPIRE PEAKS — mountain triangles === -->
  <g fill="#7a8a96" stroke="#4a5a66" stroke-width="0.5" opacity="0.88">
    <polygon points="108,108 94,135 122,135"/>
    <polygon points="140,97 124,126 156,126"/>
    <polygon points="175,88 158,119 192,119"/>
    <polygon points="212,84 194,116 230,116"/>
    <polygon points="250,86 232,116 268,116"/>
