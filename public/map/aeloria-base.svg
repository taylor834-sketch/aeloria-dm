    <polygon points="265,112 254,132 276,132" opacity="0.55"/>
    <polygon points="115,153 106,170 124,170" opacity="0.44"/>
    <polygon points="150,143 141,160 159,160" opacity="0.44"/>
    <polygon points="185,136 176,153 194,153" opacity="0.44"/>
    <polygon points="220,130 211,148 229,148" opacity="0.44"/>
    <polygon points="255,127 246,145 264,145" opacity="0.44"/>
    <polygon points="95,175 84,198 106,198" opacity="0.46"/>
    <polygon points="128,168 117,192 139,192" opacity="0.46"/>
    <polygon points="162,163 151,187 173,187" opacity="0.46"/>
    <polygon points="196,158 185,182 207,182" opacity="0.46"/>
