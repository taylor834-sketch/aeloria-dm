    <circle cx="555" cy="217" r="13"/><circle cx="581" cy="220" r="12"/><circle cx="607" cy="218" r="11"/>
    <circle cx="300" cy="256" r="13"/><circle cx="330" cy="250" r="14"/><circle cx="360" cy="254" r="13"/>
    <circle cx="390" cy="248" r="14"/><circle cx="420" cy="252" r="13"/><circle cx="448" cy="247" r="13"/>
