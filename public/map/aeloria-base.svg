  <g fill="#1e4a1e" opacity="0.48">
    <circle cx="295" cy="115" r="13"/><circle cx="322" cy="108" r="12"/><circle cx="350" cy="112" r="13"/>
    <circle cx="378" cy="106" r="12"/><circle cx="406" cy="110" r="13"/><circle cx="434" cy="108" r="12"/>
    <circle cx="462" cy="112" r="13"/><circle cx="490" cy="108" r="12"/><circle cx="518" cy="112" r="13"/>
    <circle cx="546" cy="106" r="12"/><circle cx="574" cy="110" r="11"/>
