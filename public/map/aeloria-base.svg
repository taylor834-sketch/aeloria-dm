    <!-- Southern Road: Vaelthorn → Sapphire Coast -->
    <path d="M 450,380 C 455,432 462,482 466,535 C 470,578 476,628 480,658"/>
    <!-- Fort Ashveil road -->
    <path d="M 350,500 C 388,468 420,445 450,380" stroke-dasharray="5,6"/>
  </g>

  <!-- === REGION LABELS === -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#2a1a08" letter-spacing="2">
    <!-- DREADSPIRE PEAKS -->
    <text x="172" y="244" text-anchor="middle" font-size="10" font-style="italic" font-weight="bold" opacity="0.68" transform="rotate(-8,172,244)">DREADSPIRE</text>
    <text x="172" y="258" text-anchor="middle" font-size="10" font-style="italic" font-weight="bold" opacity="0.68" transform="rotate(-8,172,258)">PEAKS</text>

    <!-- THE VEILWOOD -->
    <text x="440" y="202" text-anchor="middle" font-size="12" font-style="italic" font-weight="bold" opacity="0.50" fill="#1a3a1a">THE VEILWOOD</text>

    <!-- ASHEN MARCHES -->
    <text x="178" y="464" text-anchor="middle" font-size="10" font-style="italic" font-weight="bold" opacity="0.65" transform="rotate(-5,178,464)">ASHEN</text>
    <text x="178" y="478" text-anchor="middle" font-size="10" font-style="italic" font-weight="bold" opacity="0.65" transform="rotate(-5,178,478)">MARCHES</text>

    <!-- ARANTHOR -->
