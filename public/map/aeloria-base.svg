    <circle cx="360" cy="254" r="7"/><circle cx="448" cy="247" r="8"/><circle cx="530" cy="250" r="7"/>
  </g>

  <!-- === ASHEN MARCHES — void dust circles === -->
  <g fill="#787068" opacity="0.20">
    <circle cx="100" cy="430" r="55"/><circle cx="145" cy="490" r="65"/><circle cx="188" cy="452" r="50"/>
    <circle cx="122" cy="375" r="38"/><circle cx="210" cy="520" r="55"/><circle cx="158" cy="560" r="45"/>
    <circle cx="240" cy="478" r="38"/><circle cx="88"  cy="500" r="42"/><circle cx="178" cy="590" r="35"/>
    <circle cx="258" cy="540" r="30"/><circle cx="118" cy="540" r="38"/>
  </g>
  <!-- Hollow's Eye — void center -->
  <circle cx="100" cy="480" r="22" fill="#b8a898" opacity="0.35"/>
  <circle cx="100" cy="480" r="14" fill="#c8b8a8" opacity="0.28"/>

  <!-- === RIVERS === -->
  <g fill="none" stroke="#4a6a8a" stroke-width="1.8" opacity="0.52" stroke-linecap="round">
    <!-- Main Aranthor river south to Sapphire Coast -->
    <path d="M 490,360 C 494,405 498,448 494,495 C 490,535 488,565 492,605 C 494,628 498,648 496,665"/>
    <!-- Western river along Ashen/Aranthor border -->
    <path d="M 312,365 C 308,415 304,462 300,512 C 297,550 294,578 296,615"/>
    <!-- Dreadspire meltwater streams -->
    <path d="M 244,245 C 252,278 260,308 265,330"/>
    <path d="M 196,260 C 204,292 210,322 214,365"/>
    <!-- Veilwood stream -->
    <path d="M 424,322 C 436,355 442,380 448,415"/>
    <!-- Darian river -->
    <path d="M 820,310 C 800,355 785,390 778,435"/>
  </g>

  <!-- === ROADS === -->
  <g fill="none" stroke="#9a7824" stroke-width="1.4" opacity="0.44" stroke-dasharray="7,5">
    <!-- King's Highway: Vaelthorn → Dunmore → Lighthaven -->
    <path d="M 450,380 C 468,402 488,422 500,448 C 512,465 545,472 575,476"/>
    <!-- King's Road north toward Veilwood border -->
    <path d="M 450,380 C 442,352 432,320 424,295"/>
    <!-- Eastern Road: Vaelthorn → Darian border -->
    <path d="M 450,380 C 508,372 558,362 608,350 C 634,344 648,342 660,338"/>
    <!-- Darian main road: Ironwatch → Caldrath -->
