    <text x="0" y="38" text-anchor="middle" font-size="7" fill="#3d1f00" font-family="Georgia,serif">S</text>
    <text x="-34" y="3" text-anchor="middle" font-size="7" fill="#3d1f00" font-family="Georgia,serif">W</text>
    <text x="34" y="3" text-anchor="middle" font-size="7" fill="#3d1f00" font-family="Georgia,serif">E</text>
