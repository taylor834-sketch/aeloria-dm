    <polygon points="235,190 225,212 245,212" opacity="0.35"/>
    <polygon points="268,190 258,212 278,212" opacity="0.32"/>
  </g>
  <!-- Snow caps on tallest peaks -->
  <g fill="#eef4f8" opacity="0.80">
    <polygon points="140,97 133,110 147,110"/>
    <polygon points="175,88 168,103 182,103"/>
    <polygon points="212,84 205,100 219,100"/>
    <polygon points="250,86 243,101 257,101"/>
  </g>

