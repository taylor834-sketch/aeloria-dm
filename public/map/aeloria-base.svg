    <circle cx="557" cy="245" r="12"/><circle cx="582" cy="248" r="12"/>
    <circle cx="304" cy="284" r="12"/><circle cx="334" cy="278" r="13"/><circle cx="364" cy="282" r="12"/>
    <circle cx="394" cy="276" r="13"/><circle cx="422" cy="280" r="12"/><circle cx="450" cy="275" r="12"/>
    <circle cx="477" cy="279" r="12"/><circle cx="504" cy="274" r="12"/><circle cx="530" cy="278" r="12"/>
    <circle cx="556" cy="273" r="11"/><circle cx="580" cy="276" r="11"/>
    <circle cx="308" cy="308" r="11"/><circle cx="338" cy="303" r="12"/><circle cx="368" cy="307" r="11"/>
    <circle cx="398" cy="302" r="12"/><circle cx="426" cy="306" r="11"/><circle cx="454" cy="301" r="11"/>
    <circle cx="480" cy="305" r="11"/><circle cx="506" cy="300" r="11"/><circle cx="532" cy="304" r="11"/>
    <circle cx="558" cy="300" r="10"/>
  </g>
  <!-- Veilwood canopy highlights -->
  <g fill="#2a6a2a" opacity="0.28">
    <circle cx="350" cy="142" r="8"/><circle cx="430" cy="136" r="7"/><circle cx="510" cy="140" r="8"/>
    <circle cx="370" cy="165" r="8"/><circle cx="450" cy="163" r="7"/><circle cx="530" cy="167" r="8"/>
